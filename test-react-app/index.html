<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iris Layout</title>
  <link rel="stylesheet" href="./dist/styles.css?v=6" />
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19",
      "react-dom": "https://esm.sh/react-dom@19",
      "react-dom/client": "https://esm.sh/react-dom@19/client",
      "react/jsx-runtime": "https://esm.sh/react@19/jsx-runtime"
    }
  }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      overflow: hidden;
    }
    .app {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: 260px;
      min-width: 260px;
      background: rgba(0,0,0,0.3);
      backdrop-filter: blur(20px);
      border-right: 1px solid rgba(255,255,255,0.08);
      display: flex;
      flex-direction: column;
      padding: 20px 16px;
      gap: 16px;
    }
    .sidebar h1 {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #818cf8, #6366f1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .sidebar h3 {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: rgba(255,255,255,0.4);
      margin-bottom: 4px;
    }
    .stage-list { display: flex; flex-direction: column; gap: 4px; }
    .stage-btn {
      padding: 10px 14px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      font-size: 14px;
      text-align: left;
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .stage-btn:hover {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.9);
    }
    .stage-btn.active {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.3);
      color: #fff;
    }
    .stage-icon {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
    }
    .stage-btn.active .stage-icon {
      background: #6366f1;
      box-shadow: 0 0 8px rgba(99, 102, 241, 0.6);
    }
    .entity-list { display: flex; flex-direction: column; gap: 4px; }
    .entity-chip {
      padding: 8px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 8px;
      color: rgba(255,255,255,0.6);
      font-size: 13px;
      cursor: grab;
      transition: all 150ms ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .entity-chip:hover {
      background: rgba(255,255,255,0.06);
      transform: translateX(4px);
    }
    .entity-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    /* Hide built-in stage tabs since we have custom sidebar tabs */
    .iris-stage-tabs { display: none; }
    .main-area {
      flex: 1;
      display: flex;
      padding: 12px;
      height: 100vh;
      min-height: 0;
      overflow: hidden;
    }
    /* Entity renderers */
    .entity-panel {
      display: flex;
      flex-direction: column;
      height: 100%;
      width: 100%;
    }
    .entity-header {
      padding: 10px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-weight: 500;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.8);
    }
    .entity-header .dot {
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .entity-body {
      flex: 1;
      padding: 16px;
      font-size: 13px;
      color: rgba(255,255,255,0.5);
      overflow: auto;
    }
    .code-line {
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      line-height: 1.7;
      color: rgba(255,255,255,0.4);
    }
    .code-line .keyword { color: #c792ea; }
    .code-line .string { color: #c3e88d; }
    .code-line .comment { color: rgba(255,255,255,0.2); font-style: italic; }
    .code-line .fn { color: #82aaff; }
    .code-line .number { color: #f78c6c; }
    .terminal-body {
      font-family: 'SF Mono', 'Fira Code', monospace;
      font-size: 12px;
      line-height: 1.8;
      background: rgba(0,0,0,0.3);
      border-radius: 6px;
      padding: 12px;
      height: 100%;
    }
    .terminal-body .prompt { color: #82aaff; }
    .terminal-body .output { color: rgba(255,255,255,0.5); }
    .terminal-body .success { color: #c3e88d; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import React, { useState, createElement as h } from 'react'
    import { createRoot } from 'react-dom/client'
    import { Stage, Stages } from './dist/iris-layout.js'

    const ENTITIES = {
      editor: { id: 'editor', name: 'editor.cljs', type: 'code', color: '#6366f1' },
      terminal: { id: 'terminal', name: 'Terminal', type: 'terminal', color: '#10b981' },
      browser: { id: 'browser', name: 'Preview', type: 'browser', color: '#f59e0b' },
      notes: { id: 'notes', name: 'Notes', type: 'notes', color: '#ec4899' },
      repl: { id: 'repl', name: 'REPL', type: 'repl', color: '#8b5cf6' },
    }

    const STAGES = [
      {
        id: 'coding',
        label: 'Coding',
        layout: {
          type: 'split', id: 's1', direction: 'horizontal', ratio: 0.6,
          children: [
            { type: 'tile', id: 't1', entityId: 'editor' },
            { type: 'split', id: 's2', direction: 'vertical', ratio: 0.6,
              children: [
                { type: 'tile', id: 't2', entityId: 'terminal' },
                { type: 'tile', id: 't3', entityId: 'repl' },
              ]
            }
          ]
        }
      },
      {
        id: 'debug',
        label: 'Debug',
        layout: {
          type: 'split', id: 's3', direction: 'horizontal', ratio: 0.5,
          children: [
            { type: 'split', id: 's4', direction: 'vertical', ratio: 0.5,
              children: [
                { type: 'tile', id: 't4', entityId: 'editor' },
                { type: 'tile', id: 't5', entityId: 'terminal' },
              ]
            },
            { type: 'tile', id: 't6', entityId: 'browser' }
          ]
        }
      },
      {
        id: 'notes',
        label: 'Notes',
        layout: { type: 'tile', id: 't7', entityId: 'notes' }
      }
    ]

    function CodeRenderer() {
      const lines = [
        h('span', {className:'comment'}, ';; iris-layout core'),
        h('span', null, '(', h('span',{className:'keyword'},'ns'), ' iris-layout.core'),
        h('span', null, '  (:require [reagent.core :as r]))'),
        '',
        h('span', null, '(', h('span',{className:'keyword'},'defn'), ' ', h('span',{className:'fn'},'stage-component')),
        h('span', null, '  ', h('span',{className:'string'},'"A single layout stage."')),
        h('span', null, '  [{:keys [layout entities render-entity]}]'),
        h('span', null, '  (', h('span',{className:'keyword'},'let'), ' [handle-ratio (', h('span',{className:'keyword'},'fn'), ' [id ratio]'),
        h('span', null, '          (on-layout-change'),
        h('span', null, '            (update-split-ratio layout id ratio)))]'),
        h('span', null, '    [:div.iris-stage'),
        h('span', null, '      [surface layout handle-ratio]]))')
      ]
      return lines.map((l, i) =>
        h('div', {className:'code-line', key:i}, l || '\u00a0')
      )
    }

    function TerminalRenderer() {
      const lines = [
        h('span', null, h('span',{className:'prompt'},'$ '), 'shadow-cljs release lib'),
        h('span', {className:'output'}, '[:lib] Compiling ...'),
        h('span', {className:'success'}, '[:lib] Build completed. (62 files, 0 warnings)'),
        h('span', null, h('span',{className:'prompt'},'$ '), 'npm publish --access public'),
        h('span', {className:'output'}, '+ @p4ulcristian/iris-layout@0.1.0'),
        h('span', {className:'success'}, 'published to npm'),
        h('span', null, h('span',{className:'prompt'},'$ '), h('span',{style:{opacity:0.4}},'_')),
      ]
      return h('div', {className:'terminal-body'},
        lines.map((l, i) => h('div', {key:i}, l))
      )
    }

    function EntityRenderer(props) {
      const entity = ENTITIES[props.id] || props
      const renderers = {
        code: CodeRenderer,
        terminal: TerminalRenderer,
        repl: () => h('div', {className:'terminal-body'},
          h('div', null, h('span',{className:'prompt'},'user=> '), '(+ 1 2)'),
          h('div', {style:{color:'#c3e88d'}}, '3'),
          h('div', null, h('span',{className:'prompt'},'user=> '), '(range 5)'),
          h('div', {style:{color:'#c3e88d'}}, '(0 1 2 3 4)'),
          h('div', null, h('span',{className:'prompt'},'user=> '), h('span',{style:{opacity:0.4}},'_')),
        ),
        browser: () => h('div', {style:{
          display:'flex', alignItems:'center', justifyContent:'center',
          height:'100%', color:'rgba(255,255,255,0.3)', fontSize:14
        }}, 'localhost:3000'),
        notes: () => h('div', {style:{
          lineHeight:1.8, fontSize:13, color:'rgba(255,255,255,0.5)'
        }},
          h('div', null, 'TODO:'),
          h('div', null, '- [x] Set up ESM build target'),
          h('div', null, '- [x] Export Stage & Stages components'),
          h('div', null, '- [x] Test with React 19'),
          h('div', null, '- [ ] Publish to npm'),
          h('div', null, '- [ ] Add animations'),
        ),
      }

      const body = renderers[entity.type] || (() => h('span', null, entity.name))

      return h('div', {className:'entity-panel'},
        h('div', {className:'entity-header'},
          h('span', {className:'dot', style:{background: entity.color}}),
          entity.name
        ),
        h('div', {className:'entity-body'}, h(body))
      )
    }

    function App() {
      const [activeStageId, setActiveStageId] = useState('coding')
      const [stagesData, setStagesData] = useState(STAGES)

      const activeStage = stagesData.find(s => s.id === activeStageId) || stagesData[0]

      return h('div', {className:'app'},
        // Sidebar
        h('div', {className:'sidebar'},
          h('h1', null, 'Iris Layout'),
          h('div', null,
            h('h3', null, 'Stages'),
            h('div', {className:'stage-list'},
              stagesData.map(s =>
                h('button', {
                  key: s.id,
                  className: 'stage-btn' + (s.id === activeStageId ? ' active' : ''),
                  onClick: () => setActiveStageId(s.id)
                },
                  h('span', {className:'stage-icon'}),
                  s.label
                )
              )
            )
          ),
          h('div', null,
            h('h3', null, 'Entities'),
            h('div', {className:'entity-list'},
              Object.values(ENTITIES).map(e =>
                h('div', {
                  key: e.id,
                  className: 'entity-chip',
                  draggable: true,
                  onDragStart: (ev) => {
                    ev.dataTransfer.setData('text/plain', e.id)
                    ev.dataTransfer.effectAllowed = 'copy'
                  }
                },
                  h('span', {className:'entity-dot', style:{background: e.color}}),
                  e.name
                )
              )
            )
          )
        ),
        // Main area — Stages component with slide animation
        h('div', {className:'main-area'},
          h(Stages, {
            stages: stagesData,
            activeStage: activeStageId,
            entities: ENTITIES,
            renderEntity: EntityRenderer,
            onStagesChange: setStagesData,
            onActiveStageChange: setActiveStageId
          })
        )
      )
    }

    createRoot(document.getElementById('root')).render(h(App))
  </script>
</body>
</html>
